<!DOCTYPE html>
<html>

</head>

<div class="section">
<h2>Driver Management</h2>

<button class="btn">
Add Driver
</button>

<button class="btn">
Generate New Driver Link
</button>

<table>
<tr>
<th>Driver</th>
<th>Status</th>

</button>

</tr>

</table>

</div>

<h2>Movement Records</h2>

<table>
<tr>
<th>Driver</th>
<th>Activity</th>

</tr>

<tr>
<td colspan="4">
No records yet
</td>
</tr>

</table>

</div>

</div>

</html>
