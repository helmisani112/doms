<!DOCTYPE html>
<html>
<head>
    <title>DOMS Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<h1>DOMS Admin Dashboard</h1>

<div class="section">
<h2>Driver Management</h2>

<button class="btn" onclick="addDriver()">Add Driver</button>

<table>
<thead>
<tr>
<th>Driver</th>
<th>Phone</th>
<th>Status</th>
<th>Access Link</th>
</tr>
</thead>
<tbody id="driversTable">
<tr><td colspan="4">Loading...</td></tr>
</tbody>
</table>
</div>

<div class="section">
<h2>Vehicle Management</h2>

<button class="btn" onclick="addVehicle()">Add Vehicle</button>

<table>
<thead>
<tr>
<th>Plate No</th>
<th>Vehicle Type</th>
<th>Rental Company</th>
<th>Status</th>
</tr>
</thead>
<tbody id="vehiclesTable">
<tr><td colspan="4">Loading...</td></tr>
</tbody>
</table>
</div>

<div class="section">
<h2>Movement Records</h2>

<table>
<thead>
<tr>
<th>Driver</th>
<th>Vehicle</th>
<th>Activity</th>
<th>Location</th>
<th>Destination</th>
<th>Time</th>
</tr>
</thead>
<tbody id="movementsTable">
<tr><td colspan="6">Loading...</td></tr>
</tbody>
</table>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
