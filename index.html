<!DOCTYPE html>
<html>
<head>
    <title>DOMS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>🚗 DOMS</h1>
<h3>Driver Operations & Movement System</h3>

<div class="dashboard">

<div class="card">
<h2 id="onDutyCount">0</h2>
<p>Drivers On Duty</p>
</div>

<div class="card">
<h2 id="standbyCount">0</h2>
<p>Drivers Standby</p>
</div>

<div class="card">
<h2 id="offDutyCount">0</h2>
<p>Drivers Off Duty</p>
</div>

<div class="card">
<h2 id="vehicleCount">0</h2>
<p>Vehicles Active</p>
</div>

</div>

<br>

<a href="driver.html">
<button class="btn">
Driver Update
</button>
</a>

<a href="admin.html">
<button class="btn admin">
Admin Login
</button>
</a>

<div class="section">

<h2>Latest Activities</h2>

<div class="activity-scroll">
    <table>
        <thead>
            <tr>
                <th>Driver</th>
                <th>Vehicle</th>
                <th>Activity</th>
                <th>Location</th>
                <th>Destination</th>
                <th>Time</th>
            </tr>
        </thead>

        <tbody id="activityTable">
            <tr>
                <td colspan="6">Loading...</td>
            </tr>
        </tbody>
    </table>
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
