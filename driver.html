<!DOCTYPE html>
<html>
<head>
    <title>DOMS Driver Update</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Driver Activity Update</h1>

<div class="section">
<p><b>Driver:</b> <span id="driverNameDisplay">Loading...</span></p>

<form id="driverForm">

<label>Vehicle Plate No</label>
<select id="vehicleSelect" required></select>

<label>Activity</label>
<select id="activity" required>
    <option>Vehicle Inspection</option>
    <option>Start Duty</option>
    <option>Pick Up</option>
    <option>Drop Off</option>
    <option>Standby</option>
    <option>Break</option>
    <option>Breakdown</option>
    <option>Accident</option>
    <option>End Duty</option>
</select>

<label>Current Location</label>
<input type="text" id="location" required>

<label>Destination</label>
<input type="text" id="destination">

<label>Passenger Count</label>
<input type="number" id="passengerCount" min="0" value="0">

<label>Passenger Name (Optional)</label>
<input type="text" id="passengerName">

<label>Remarks</label>
<textarea id="remarks"></textarea>

<button type="submit">Submit Update</button>

</form>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
