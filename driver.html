<!DOCTYPE html>
<html>
<head>
    <title>DOMS Driver Update</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Driver Activity Update</h1>

<div class="section">
<p><b>Driver:</b> <span id="driverNameDisplay">Loading...</span></p>

<form id="driverForm">

<label>Vehicle Plate No</label>
<select id="vehicleSelect" required></select>

<label>Driver Status</label>
<select id="driverStatus" required>
    <option>On Duty</option>
    <option>Standby</option>
    <option>Off Duty</option>
</select>

<label>Activity</label>
<select id="activity" required>
    <option>Vehicle Inspection</option>
    <option>Pick Up</option>
    <option>Drop Off</option>
    <option>Standby</option>
    <option>Break</option>
    <option>Breakdown</option>
    <option>Accident</option>
    <option>End Duty</option>
</select>

<label>Current Location</label>
<input type="text" id="location" required>

<label>Destination</label>
<input type="text" id="destination">

<h3>Passenger Manifest</h3>

<label>Passenger Count</label>
<input type="number" id="passengerCount" min="0" value="0">

<label>Passenger Name / Remarks</label>
<textarea id="passengerName" placeholder="Example: Ahmad, Joseph, 2 visitors"></textarea>

<h3>Vehicle Inspection Checklist</h3>

<label><input type="checkbox" id="tyreOk"> Tyres OK</label><br>
<label><input type="checkbox" id="brakeOk"> Brake OK</label><br>
<label><input type="checkbox" id="lightsOk"> Lights OK</label><br>
<label><input type="checkbox" id="mirrorsOk"> Mirrors OK</label><br>
<label><input type="checkbox" id="hornOk"> Horn OK</label><br>
<label><input type="checkbox" id="fireExtinguisherOk"> Fire Extinguisher OK</label><br>
<label><input type="checkbox" id="firstAidOk"> First Aid Kit OK</label><br>

<label>Odometer</label>
<input type="number" id="odometer">

<label>Defect Found?</label>
<select id="defectFound">
    <option value="false">No</option>
    <option value="true">Yes</option>
</select>

<label>Defect Description</label>
<textarea id="defectDescription"></textarea>

<label>General Remarks</label>
<textarea id="remarks"></textarea>

<br><br>
<button type="submit">Submit Update</button>

</form>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
